name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - run: go vet ./...

      - run: go test -race ./...

  build:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - run: make all

      - uses: actions/upload-artifact@v4
        with:
          name: binaries
          path: |
            gdrive-readonly-mcp
            gdrive-readonly-mcp.exe
            gdrive-readonly-mcp-darwin-amd64
            gdrive-readonly-mcp-darwin-arm64
            gdrive-readonly-mcp-linux-amd64
